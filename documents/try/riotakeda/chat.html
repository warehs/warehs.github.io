<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chat Archive - 95-70 Layout</title>
    <style>
        body {
            background-color: #fefefe;
            font-family: sans-serif;
            margin: 0;
            padding: 20px 0; /* 上下の余白 */
            display: flex;
            justify-content: center; /* 全体を中央寄せ */
        }

        /* 画面全体の95%を占めるコンテナ */
        .chat-wrapper {
            width: 92%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 共通の吹き出し設定 */
        .bubble {
            /* 吹き出し自体の最大幅を画面（親要素）の70%に設定 */
            max-width: 66%; 
            padding: 30px 30px;
            border-radius: 50px;
            font-size: 42px;
            line-height: 1.2;
            word-wrap: break-word;
            position: relative;
            margin: 7px 0;
            white-space: pre-wrap;
        }

        /* 相手：左寄せ・灰色 */
        .receive {
            align-self: flex-start;
            background-color: #e9e9ea; /* 灰色より白に近い方が読みやすい場合も多いです */
            color: #000000;
            border: 1px solid #ddd;
        }

        /* 自分：右寄せ・緑色 */
        .send {
            align-self: flex-end;
            background-color: #41d264; /* 少し鮮やかな緑 */
            color: #ffffff;
        }

        /* 日付などの区切り線（おまけ） */
        .date-divider {
            text-align: center;
            font-size: 26px;
            color: #888;
            margin: 16px 0　10px 0;
        }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="date-divider">
        テキストメッセージ・SMS
        3月13日 (金) 9:28
    </div>

    <div class="bubble receive">
        卒業しました
        数学4でした
        泣きます
    </div>

    <div class="bubble send">
        卒業おめでとう
        過去の自分より成長したらそれでよし
        よく頑張ったもんね
    </div>

    <div class="bubble receive">
        昨日は卒業式後クラスの打ち上げで
        ボウリングと焼肉をよくがんばりました
    </div>

    <div class="bubble send">
        青春を楽しんでそうでなにより
        あとは吹部がある感じか
    </div>
</div>

</body>
</html>
