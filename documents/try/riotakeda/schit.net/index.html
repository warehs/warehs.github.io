<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>日付階層ツリー</title>
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { padding: 20px; font-family: "Meiryo", sans-serif; }
        .tree { border: 1px solid #ccc; }
        /* アイコンの見た目を少し調整 */
        .tree .glyphicon { margin-right: 8px; }
        /* 説明文用のスタイル */
        .comment { color: #d00; margin-left: 15px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h3>日付別アーカイブ</h3>
    
    <table id="myTree" class="table table-hover tree">
        <tbody>
            <tr data-node-id="2023">
                <td>2023</td>
            </tr>
            <tr data-node-id="2023-11" data-node-parent-id="2023">
                <td>11</td>
            </tr>
            <tr data-node-id="2023-11-21" data-node-parent-id="2023-11">
                <td>21</td>
            </tr>
            <tr data-node-id="2023-11-21-f1" data-node-parent-id="2023-11-21">
                <td>index.html <span class="comment">← 11月のファイル</span></td>
            </tr>

            <tr data-node-id="2023-12" data-node-parent-id="2023">
                <td>12</td>
            </tr>
            <tr data-node-id="2023-12-21" data-node-parent-id="2023-12">
                <td>21</td>
            </tr>
            <tr data-node-id="2023-12-21-f1" data-node-parent-id="2023-12-21">
                <td>index.html</td>
            </tr>

            <tr data-node-id="2024">
                <td>2024</td>
            </tr>
            <tr data-node-id="2024-01" data-node-parent-id="2024">
                <td>01</td>
            </tr>
            <tr data-node-id="2024-01-09" data-node-parent-id="2024-01">
                <td>09</td>
            </tr>
            <tr data-node-id="2024-01-09-f1" data-node-parent-id="2024-01-09">
                <td>index.html</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
<script src="https://netdna.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
<script src="https://www.jqueryscript.net/demo/collapsible-tree-bootstrap/bootstrap-treeview.js"></script>

<script>
    $(document).ready(function() {
        $('#myTree').treeview({
            // 初期状態で閉じておきたい場合はここにオプションを書きます
            // 例: collapsed: true
        });
    });
</script>

</body>
</html>
