<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chat Archive - Full Width</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* チャット全体のエリア（横幅いっぱい） */
        .chat-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 共通の吹き出し設定 */
        .bubble {
            /* ここがポイント：画面幅の0.6（60%）を最大値にする */
            max-width: 70%; 
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }

        /* 相手：左寄せ・灰色 */
        .receive {
            align-self: flex-start;
            background-color: #e4e6eb;
            color: #000;
        }

        /* 自分：右寄せ・緑色 */
        .send {
            align-self: flex-end;
            background-color: #dcf8c6;
            color: #000;
        }

        /* 時刻などのメタデータ（必要なければ消してください） */
        .meta {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="chat-area">
    <div class="bubble receive">
        吹き出しの幅を画面の0.6に設定しました。
        <span class="meta">12:00</span>
    </div>

    <div class="bubble send">
        これなら、PCで開いても一気に横に広がらないから読みやすいね。
        <span class="meta">12:01</span>
    </div>

    <div class="bubble send">
        左右に無駄な余白を作らず、メッセージの位置（左か右か）だけで判別できる構成だよ。
        <span class="meta">12:01</span>
    </div>
    
    <div class="bubble receive">
        確かに！長い文章が入っても、ちゃんと6割のところで改行されるから安心です。
        <span class="meta">12:05</span>
    </div>
</div>

</body>
</html>
