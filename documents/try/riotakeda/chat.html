<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chat Archive - 95-70 Layout</title>
    <style>
        body {
            background-color: #fefefe;
            font-family: sans-serif;
            margin: 0;
            padding: 20px 0; /* 上下の余白 */
            display: flex;
            justify-content: center; /* 全体を中央寄せ */
        }

        /* 画面全体の95%を占めるコンテナ */
        .chat-wrapper {
            width: 92%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 共通の吹き出し設定 */
        .bubble {
            /* 吹き出し自体の最大幅を画面（親要素）の70%に設定 */
            max-width: 70%; 
            padding: 20px 18px;
            border-radius: 50px;
            font-size: 40px;
            line-height: 1.2;
            word-wrap: break-word;
            position: relative;
            margin: 10px 0;
        }

        /* 相手：左寄せ・灰色 */
        .receive {
            align-self: flex-start;
            background-color: #e9e9ea; /* 灰色より白に近い方が読みやすい場合も多いです */
            color: #000000;
            border: 1px solid #ddd;
        }

        /* 自分：右寄せ・緑色 */
        .send {
            align-self: flex-end;
            background-color: #3cd062; /* 少し鮮やかな緑 */
            color: #ffffff;
        }

        /* 日付などの区切り線（おまけ） */
        .date-divider {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="date-divider">2024年5月20日</div>

    <div class="bubble receive">
        画面幅を95%に、吹き出しの最大幅を70%に変更しました。
    </div>

    <div class="bubble send">
        これなら広い画面でも窮屈じゃないし、メッセージが長くなっても7割のところで折り返されるから、視線の移動が少なくて済むね！
    </div>

    <div class="bubble send">
        「画面の端っこすぎる」と感じる場合は、この `95%` を少しずつ下げれば調整できるよ。
    </div>
</div>

</body>
</html>
