<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>条文暗記プラットフォーム</title>
    <style>
        :root { 
            --sidebar-width: 220px; 
            --primary-blue: #2c3e50; 
            --text-color: #1a1a1a;
            --bg-color: #f4f7f6;
        }
        
        body { 
            display: flex; margin: 0; 
            font-family: "ヒラギノ明朝 ProN W3", "Hiragino Mincho ProN", "MS P明朝", "MS Mincho", "serif"; 
            height: 100vh; background: var(--bg-color); color: var(--text-color); overflow: hidden;
        }
        
        /* サイドバー */
        #sidebar { 
            width: var(--sidebar-width); background: #fff; border-right: 1px solid #dcdfe6; 
            overflow-y: auto; display: flex; flex-direction: column;
        }
        #sidebar h2 { font-size: 0.85rem; padding: 15px 20px; margin: 0; background: #eee; color: #666; }
        #menu-container { flex: 1; overflow-y: auto; }
        .menu-item { 
            padding: 10px 20px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid #eee; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .menu-item:hover { background: #f9f9f9; }
        .menu-item.active { background: #eef2f7; color: #000; font-weight: bold; border-left: 4px solid var(--primary-blue); }

        /* メインコンテンツ */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
        #header { 
            padding: 10px 30px; border-bottom: 1px solid #eee; display: flex; 
            justify-content: space-between; align-items: center; background: #fafafa;
        }
        
        /* 表示エリア基本設定 */
        #display-area { 
            flex: 1; overflow-y: auto; padding: 20px 40px; 
            line-height: 1.6; font-size: 1.05rem; text-align: justify;
        }

        /* --- 【最優先】几帳面インデント設定 --- */
        
        /* 全ての要素の余白を統一 */
        #display-area h3, #display-area h4, #display-area p {
            margin: 8px 0 !important;
            padding: 0 !important;
            position: relative;
        }

        /* １．大見出し */
        #display-area h3 { 
            font-size: 1.15rem; 
            padding-left: 1.5em !important; 
            text-indent: -1.5em !important; 
            border-bottom: 2px solid #2c3e50;
            margin-top: 25px !important;
        }

        /* （１）中見出し */
        #display-area h4 { 
            font-size: 1.1rem; 
            padding-left: 1.5em !important; 
            text-indent: -1.5em !important;
            margin-top: 15px !important;
        }

        /* ① 号（indent-1）と 本文（body-text）のツラを「3.5em」で揃える */
        #display-area .indent-1,
        #display-area .body-text { 
            padding-left: 3.5em !important; 
            text-indent: 0 !important;
        }

        /* ① の記号だけ左へ 1.5em 突き出す */
        #display-area .indent-1 { 
            text-indent: -1.5em !important; 
        }

        /* イ 細目 */
        #display-area .indent-2 { 
            padding-left: 5.0em !important; 
            text-indent: -1.5em !important; 
        }

        /* マスク設定 */
        .mask { background: #000; color: #000; cursor: pointer; padding: 0 2px; display: inline; border-bottom: 1px solid #000; position: relative; }
        .mask.reveal { background: transparent; color: #d44; font-weight: bold; border-bottom: 1px solid #ddd; }
        .remove-btn {
            position: absolute; top: -10px; background: #f00; color: #fff; font-size: 10px;
            padding: 0 4px; border-radius: 3px; z-index: 10; display: none; line-height: 1;
        }
        .mask:hover .remove-btn { display: inline-block; }

        button { font-family: serif; font-size: 0.85rem; padding: 5px 15px; cursor: pointer; border-radius: 4px; }
        .btn-primary { background: var(--primary-blue); color: #fff; border: none; }
        .btn-danger { background: #fff; color: #d44; border: 1px solid #d44; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>条文リスト</h2>
    <div id="menu-container"></div>
    <div style="padding: 15px; border-top: 1px solid #eee; background: #fafafa;">
        <button class="btn-danger" style="width:100%" onclick="resetCurrentSheet()">暗記データをリセット</button>
    </div>
</div>

<div id="main-content">
    <div id="header">
        <h1 id="current-title" style="margin:0; font-size:1.1rem; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:40%;">条文を選択</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="update-time" style="font-size:0.75rem; color:#909399; font-family: sans-serif;"></span>
            <span id="save-status" style="font-size:0.8rem; color:#67C23A; font-weight:bold;"></span>
            <button class="btn-primary" onclick="saveCurrentData()">保存</button>
        </div>
    </div>
    <div id="display-area" onmouseup="handleSelection()">
        <div style="text-align:center; color:#999; margin-top:50px;">左から条文を選択してください。</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
// --- Firebase設定 ---
const firebaseConfig = {
  apiKey: "AIzaSyBuU0l8CzxvUJshPljuAq5LLI8mCGG0f2g",
  authDomain: "warehs.firebaseapp.com",
  databaseURL: "https://warehs-default-rtdb.firebaseio.com",
  projectId: "warehs",
  storageBucket: "warehs.firebasestorage.app",
  messagingSenderId: "351013737525",
  appId: "1:351013737525:web:af00783211e57ec5b18d7c",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- データリスト（省略：ここにお持ちの55件を戻してください） ---
const dataList = [
    { id: "tax_01", title: "1-1：課税の対象", file: "data/1-1.txt" },
    { id: "tax_02", title: "1-2：国内取引の判定", file: "data/1-2.txt" },
    // ... 他のデータ ...
];

let currentFileId = "";
let originalHtmlBackup = "";

// メニュー生成
const menuContainer = document.getElementById('menu-container');
dataList.forEach(item => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.innerText = item.title;
    div.addEventListener('click', () => loadJoubun(item));
    menuContainer.appendChild(div);
});

// 条文読み込み
async function loadJoubun(item) {
    currentFileId = item.id;
    document.getElementById('current-title').innerText = item.title;
    
    document.querySelectorAll('.menu-item').forEach(el => {
        el.classList.toggle('active', el.innerText === item.title);
    });

    try {
        const response = await fetch(item.file);
        if (!response.ok) throw new Error();
        const text = await response.text();
        originalHtmlBackup = parseTextToHTML(text);

        const snapshot = await db.ref('anki_sheets/' + currentFileId).once('value');
        const savedData = snapshot.val();

        if (savedData) {
            renderHTML(savedData.html);
            document.getElementById('update-time').innerText = savedData.timestamp ? "最終保存: " + savedData.timestamp : "";
        } else {
            renderHTML(originalHtmlBackup);
            document.getElementById('update-time').innerText = "未保存";
        }
    } catch (e) {
        document.getElementById('display-area').innerHTML = `<div style="color:red; padding:20px;">エラー: ${item.file} が読み込めません。</div>`;
    }
}

// テキスト変換ロジック（ここが修正のキモ）
function parseTextToHTML(text) {
    return text.split('\n').map(line => {
        const trimmed = line.trim();
        if (!trimmed) return ""; 

        // 判定
        if (/^[０-９\d]．/.test(trimmed)) return `<h3>${line}</h3>`;
        if (/^\([０-９\d]\)/.test(trimmed)) return `<h4>${line}</h4>`;
        if (/^[①-⑳]/.test(trimmed)) return `<p class="indent-1">${line}</p>`;
        if (/^[ア-ンイ]/.test(trimmed)) return `<p class="indent-2">${line}</p>`;
        
        // それ以外（本文）は確実に body-text クラスを付与
        return `<p class="body-text">${line}</p>`;
    }).join('');
}

function renderHTML(html) {
    const area = document.getElementById('display-area');
    area.innerHTML = html;
    area.querySelectorAll('.mask').forEach(setupMaskEvents);
}

function setupMaskEvents(el) {
    el.onclick = function(e) {
        if (e.target.classList.contains('remove-btn')) return;
        this.classList.toggle('reveal');
    };
    if (!el.querySelector('.remove-btn')) {
        const btn = document.createElement('span');
        btn.className = 'remove-btn';
        btn.innerText = '×';
        btn.onclick = (e) => { e.stopPropagation(); removeSingleMask(el); };
        el.appendChild(btn);
    }
}

function handleSelection() {
    const sel = window.getSelection();
    if (!sel.rangeCount || sel.toString().length === 0) return;
    const range = sel.getRangeAt(0);
    if (range.startContainer.parentElement !== range.endContainer.parentElement) {
        alert("段落をまたいだ選択はできません。");
        return;
    }
    const span = document.createElement('span');
    span.className = 'mask';
    span.textContent = sel.toString();
    setupMaskEvents(span);
    range.deleteContents();
    range.insertNode(span);
    sel.removeAllRanges();
}

function removeSingleMask(maskEl) {
    const text = maskEl.firstChild.textContent;
    maskEl.parentNode.replaceChild(document.createTextNode(text), maskEl);
}

function saveCurrentData() {
    if (!currentFileId) return;
    const now = new Date();
    const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
    const html = document.getElementById('display-area').innerHTML;
    db.ref('anki_sheets/' + currentFileId).set({ html: html, timestamp: timeStr }).then(() => {
        document.getElementById('update-time').innerText = "最終保存: " + timeStr;
        document.getElementById('save-status').innerText = "✓";
        setTimeout(() => document.getElementById('save-status').innerText = "", 2000);
    });
}

function resetCurrentSheet() {
    if (!currentFileId || !confirm("この条文の暗記データをリセットしますか？")) return;
    renderHTML(originalHtmlBackup);
    db.ref('anki_sheets/' + currentFileId).remove().then(() => {
        document.getElementById('update-time').innerText = "未保存";
    });
}
</script>
</body>
</html>
