<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ディレクトリ一覧</title>
    <style>
        /* 文字を少し大きくし、リンクの線を消して見やすくしています */
        body { font-family: sans-serif; line-height: 1.8; }
        ul { list-style-type: "└ "; } /* 行頭をカギ線に */
        ul ul { margin-left: 20px; }  /* 子要素を右にずらす */
        a { text-decoration: none; color: #000; }
        a:hover { text-decoration: underline; color: blue; }
    </style>
</head>
<body>

    <strong>📁 ルートディレクトリ</strong>

    <ul>
        <li><a href="folder_A/">フォルダA</a>
            <ul>
                <li><a href="folder_A/file_B.html">ファイルB</a>
                    <ul>
                        <li><a href="folder_A/sub/file_C.pdf">ファイルC</a></li>
                    </ul>
                </li>
            </ul>
        </li>
        <li><a href="file_D.jpg">ファイルD</a></li>
    </ul>

</body>
</html>
